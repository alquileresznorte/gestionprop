// helpers
function ls(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lw(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function fmt(n){return "$"+Number(n||0).toLocaleString("es-AR");}
function fusd(n,tc){return tc>0?"U$S "+Math.round(n/tc):"--";}
function hoy(){return new Date().toISOString().split("T")[0];}
function mes(){return new Date().toISOString().slice(0,7);}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
var _nc=ls("gp_nc",2000);

function pA(c){return c&&c.pagos?Object.values(c.pagos):[];}
function pT(c){return pA(c).reduce(function(s,p){return s+p.monto;},0);}

// HTML builders - ALL use double-quoted attributes, no mixing
function H(tag,attrs,inner){var a=Object.keys(attrs).map(function(k){return k+'="'+attrs[k]+'"';}).join(" ");return "<"+tag+(a?" "+a:"")+">"+inner+"</"+tag+">";}
function sc(ic,lb,val,sub,col){return "<div class='sc'><div style='font-size:18px'>"+ic+"</div><div style='color:#94A3B8;font-size:10px;font-weight:600;text-transform:uppercase;margin-top:4px'>"+lb+"</div><div style='font-size:20px;font-weight:800;color:"+(col||"#F1F5F9")+"'>"+val+"</div><div style='color:#64748B;font-size:10px'>"+(sub||"")+"</div></div>";}

function fld(id,lb,val,tp){return "<div class='fld'><label class='lbl'>"+lb+"</label><input class='inp' id='"+id+"' type='"+(tp||"text")+"' value='"+esc(val||"")+"'/></div>";}
function sld(id,lb,opts,val){var o=opts.map(function(x){return "<option"+(x===val?" selected":"")+">"+x+"</option>";}).join("");return "<div class='fld'><label class='lbl'>"+lb+"</label><select class='inp' id='"+id+"'>"+o+"</select></div>";}

// Modal
var MODS=[];
function openModal(title,html,wide){
  var d=document.createElement("div");

  d.onclick=function(e){if(e.target===d)closeModal();};
  document.body.appendChild(d);MODS.push(d);
}
function closeModal(){var d=MODS.pop();if(d)d.remove();}

// State

var DKEYS=["iq","cob","cst","ev","movs","cierres","aj","hist","subc"];

function startDB(){
  DKEYS.forEach(function(k){
    DB.ref(k).on("value",function(s){DATA[k]=s.exists()?s.val():{};render();});
  });
}
function stopDB(){DKEYS.forEach(function(k){DB.ref(k).off();});}

function render(){
  if(!USER){rLogin();return;}
  rShell();

  if(fn[SEC])fn[SEC]();
}
function go(s){SEC=s;render();}

// LOGIN
function rLogin(){
  var saved=ls("gp_rem",null);
  if(saved){var f=USUARIOS.filter(function(x){return x.u===saved.u&&x.p===saved.p;})[0];if(f){doLogin(f);return;}}
  G("app").innerHTML="<div style='min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px'><div class='card' style='max-width:340px;width:100%;padding:28px'><div style='text-align:center;margin-bottom:22px'><div style='background:linear-gradient(135deg,#3B82F6,#8B5CF6);border-radius:12px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 10px'>GP</div><h1 style='font-size:20px;font-weight:800'>GestionProp</h1></div>"+fld("lu","Usuario")+fld("lp","Contrasena","","password")+"<label style='display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;background:#0F172A;border-radius:9px;border:1px solid #334155;margin-bottom:10px'><input type='checkbox' id='rem'/> <span style='font-size:12px'>Recordarme</span></label><div id='lerr' style='color:#EF4444;font-size:12px;margin-bottom:8px;display:none'>Usuario o clave incorrectos</div><button class='btn bp' onclick='tryLogin()' style='width:100%;padding:11px'>Ingresar</button></div></div>";
  G("lp").onkeydown=function(e){if(e.key==="Enter")tryLogin();};
}
function tryLogin(){
  var u=G("lu").value.trim(),p=G("lp").value;
  var f=USUARIOS.filter(function(x){return x.u===u&&x.p===p;})[0];
  if(f){if(G("rem").checked)lw("gp_rem",{u:u,p:p});else lw("gp_rem",null);doLogin(f);}
  else G("lerr").style.display="block";
}
function doLogin(u){USER=u;SEC=u.r==="admin"?"panel":"alertas";startDB();}
function logout(){lw("gp_rem",null);stopDB();USER=null;SEC="login";render();}

// SHELL
function rShell(){
  var esA=USER.r==="admin";
  var m=mes(),al=oA(DATA.cob).filter(function(c){return c.mes===m&&c.estado!=="pagado";}).length;
  var totU=Object.values(ED).reduce(function(s,e){return s+e.u;},0);
  var act=oA(DATA.iq).filter(function(i){return i.estado==="activo";}).length;
  var navA=[["panel","Panel"],["alertas","Alertas"],["acuerdos","Acuerdos"],["historial","Historial"],["cobranzas","Cobros"],["costos","Costos"],["agenda","Agenda"],["caja","Caja"],["stats","Stats"]];
  var navE=[["alertas","Alertas"],["acuerdos","Acuerdos"],["cobranzas","Cobros"],["costos","Costos"],["agenda","Agenda"],["caja","Caja"]];
  var nav=esA?navA:navE;
  var nh=nav.map(function(n){
    var s=n[0],lb=n[1];
    var cls="nb"+(SEC===s?" on":"");
    var ab=s==="cobranzas"&&al>0?"<span style='background:#EF4444;color:#fff;border-radius:8px;font-size:8px;padding:1px 4px;font-weight:800;margin-left:2px'>"+al+"</span>":"";
    return "<button class='"+cls+"' data-go='"+s+"'>"+lb+ab+"</button>";
  }).join("");
  G("app").innerHTML="<div style='min-height:100vh'><div style='background:#1E293B;border-bottom:1px solid #334155;padding:0 10px;position:sticky;top:0;z-index:100'><div style='max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:46px;gap:6px'><div style='font-weight:800;color:#3B82F6;font-size:14px'>GP</div><nav style='display:flex;gap:1px;flex-wrap:wrap;justify-content:center;flex:1' id='nav'>"+nh+"</nav><div style='display:flex;align-items:center;gap:6px;flex-shrink:0'><div style='text-align:right'><div style='color:#F1F5F9;font-size:10px;font-weight:600'>"+USER.n+"</div><div style='font-size:9px;color:"+(esA?"#8B5CF6":"#10B981")+"'>"+act+"/"+totU+"</div></div><button class='btn bg bsm' onclick='logout()'>Salir</button></div></div></div><div id='main' style='max-width:1200px;margin:0 auto;padding:14px 12px'></div></div>";
  // Event delegation for nav
  G("nav").onclick=function(e){var b=e.target.closest("[data-go]");if(b)go(b.dataset.go);};
}

// PANEL
function rPanel(){
  var m=mes(),h=new Date();
  var iqA=oA(DATA.iq),cobA=oA(DATA.cob),evA=oA(DATA.ev);
  var totU=Object.values(ED).reduce(function(s,e){return s+e.u;},0);
  var act=iqA.filter(function(i){return i.estado==="activo";}).length;
  var cobrado=cobA.filter(function(c){return c.mes===m;}).reduce(function(s,c){return s+pT(c);},0);
  var pend=cobA.filter(function(c){return c.mes===m&&c.estado!=="pagado";}).length;
  var evH=evA.filter(function(e){return e.fecha===hoy();}).length;
  var proxV=iqA.filter(function(i){if(i.estado!=="activo"||!i.egreso)return false;var d=Math.round((new Date(i.egreso)-h)/86400000);return d>=0&&d<=15;});
  var proxA=iqA.filter(function(i){if(i.estado!=="activo"||!i.ultimo_aj)return false;var ua=new Date(i.ultimo_aj),pr=new Date(ua);pr.setMonth(pr.getMonth()+4);var d=Math.round((pr-h)/86400000);return d>=0&&d<=15;});
  var o="<h2 style='font-size:20px;font-weight:800;margin-bottom:4px'>Panel General</h2><p style='color:#64748B;font-size:11px;margin-bottom:12px'>"+new Date().toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+"</p>";
  o+="<div style='display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px'>";
  o+=sc("GP","Ocupacion",(totU?Math.round((act/totU)*100):0)+"%",act+"/"+totU,"");
  o+=sc("$","Cobrado",fmt(cobrado),"este mes","#10B981");
  o+=sc("!","Pendientes",pend,"pagos","#F59E0B");
  o+=sc("C","Hoy",evH,"eventos","#06B6D4");

    var egrS=cstA.filter(function(c){return c.fec_venc===_cajaF&&c.cuenta===cta;}).reduce(function(s,c){return s+Number(c.monto||0);},0)+ajA.filter(function(a){return a.fecha===_cajaF&&a.tipo==="egreso"&&a.cuenta===cta;}).reduce(function(s,a){return s+Number(a.monto||0);},0);
    var sistema=ingS-egrS,real=Number((G("sc-"+cta.replace(/ /g,"-"))||{value:0}).value||0),dif=real-sistema;
    saldos[cta]={sistema:sistema,real:real,dif:dif};
    if(dif!==0){var nk=DB.ref("aj").push().key;ups["aj/"+nk]={fecha:_cajaF,tipo:dif>0?"ingreso":"egreso",sub:"Diferencia de caja",cuenta:cta,concepto:"Diferencia subcierre "+_cajaF,monto:Math.abs(dif),auto:true};}
  });
  var sk=DB.ref("subc").push().key;ups["subc/"+sk]={fecha:_cajaF,cerradoPor:USER.n,saldos:saldos};
  DB.ref("/").update(ups);closeModal();alert("Subcierre registrado.");setTimeout(rCaja,300);
}
function openMov(){
  var o="<p style='color:#94A3B8;font-size:11px;margin-bottom:12px'>No afecta el calculo de utilidad.</p><div class='g2'>"+fld("mv-f","Fecha",hoy(),"date")+"<div class='fld'><label class='lbl'>Tipo</label><select class='inp' id='mv-t'><option value='retiro'>Retiro</option><option value='aporte'>Aporte</option></select></div>"+sld("mv-c","Cuenta",CTAP)+fld("mv-m","Monto $","","number")+"</div>"+fld("mv-n","Nota")+"<div style='display:flex;justify-content:flex-end;gap:7px;margin-top:12px'><button class='btn bg bsm' onclick='closeModal()'>Cancelar</button><button class='btn bok bsm' onclick='saveMov()'>Registrar</button></div>";
  openModal("Retiro / Aporte",o);
}
function saveMov(){var m=Number(G("mv-m").value);if(!m){alert("Ingresa el monto");return;}DB.ref("movs").push({fecha:G("mv-f").value,tipo:G("mv-t").value,cuenta:G("mv-c").value,monto:m,nota:G("mv-n").value});closeModal();setTimeout(rCaja,300);}

// STATS
function rStats(){
  var iqA=oA(DATA.iq),histA=oA(DATA.hist),cobA=oA(DATA.cob),cstA=oA(DATA.cst),cieA=oA(DATA.cierres);
  var act=iqA.filter(function(i){return i.estado==="activo";});
  var totU=Object.values(ED).reduce(function(s,e){return s+e.u;},0);
  var m=mes(),iM=cobA.filter(function(c){return c.mes===m;}).reduce(function(s,c){return s+pT(c);},0);
  var eM=cstA.filter(function(c){return c.mes===m&&c.pagado;}).reduce(function(s,c){return s+Number(c.monto||0);},0);
  var tcVal=Number(localStorage.getItem("gp_tc_"+m)||0);
  var o="<h2 style='font-size:20px;font-weight:800;margin-bottom:12px'>Estadisticas</h2><div style='display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px'>";
  o+=sc("GP","Activos",act.length+"/"+totU,(totU?Math.round((act.length/totU)*100):0)+"%","");
  o+=sc("R","Rotacion",histA.length,"historico","#F59E0B");
  o+=sc("$","Renta/mes",fmt(act.reduce(function(s,i){return s+i.alquiler;},0)),"","#10B981");
  o+=sc("C","Cobrado",fmt(iM),"este mes","#10B981");
  o+=sc("X","Costos",fmt(eM),"este mes","#EF4444");
  o+="</div>";
  o+="<div class='card' style='margin-bottom:10px;overflow-x:auto'><h3 style='font-size:13px;font-weight:700;margin-bottom:8px'>Por Edificio</h3><table class='tbl'><thead><tr><th>Edif.</th><th>Total</th><th>Ocup.</th><th>Libre</th><th>%</th><th>Renta/mes</th><th>USD</th></tr></thead><tbody>";
  Object.keys(ED).forEach(function(cod){var inq=act.filter(function(i){return i.unidad&&i.unidad.startsWith(cod+"-");});var tot=ED[cod].u,renta=inq.reduce(function(s,i){return s+i.alquiler;},0);o+="<tr><td>"+bdg(cod,COL[cod]||"#64748B")+"</td><td>"+tot+"</td><td style='color:#10B981;font-weight:600'>"+inq.length+"</td><td style='color:"+(tot-inq.length>0?"#EF4444":"#64748B")+"'>"+(tot-inq.length)+"</td><td>"+(tot?Math.round((inq.length/tot)*100):0)+"%</td><td style='color:#10B981;font-weight:700'>"+fmt(renta)+"</td><td style='color:#06B6D4'>"+(tcVal>0?fusd(renta,tcVal):"--")+"</td></tr>";});
  o+="</tbody></table></div>";
  if(cieA.length){o+="<div class='card' style='overflow-x:auto'><h3 style='font-size:13px;font-weight:700;margin-bottom:8px'>Historial de Utilidades</h3><table class='tbl'><thead><tr><th>Mes</th><th>Ingresos</th><th>Egresos</th><th>Utilidad</th><th>USD</th></tr></thead><tbody>";cieA.sort(function(a,b){return(b.mes||"").localeCompare(a.mes||"");}).forEach(function(c){o+="<tr><td style='font-weight:600'>"+c.mes+"</td><td style='color:#10B981'>"+fmt(c.ingresos)+"</td><td style='color:#EF4444'>"+fmt(c.egresos)+"</td><td style='color:"+(c.utilidad>=0?"#10B981":"#EF4444")+";font-weight:700'>"+fmt(c.utilidad)+"</td><td style='color:#06B6D4'>"+(c.tc>0?fusd(c.utilidad,c.tc):"--")+"</td></tr>";});o+="</tbody></table></div>";}
  G("main").innerHTML=o;
}

render();
</script>
